name: Build & Push Nethub Backend Image

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Enable QEMU (required for cross-platform builds)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Enable Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build & Push Multi-Platform Image
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile

          # 🔥 Multi-platform target
          platforms: linux/amd64,linux/arm64

          push: true

          # Tag with Git tag (v1.0.0)
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nethubke:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/nethubke:latest

          # 🚀 Build cache (important for speed)
          cache-from: type=gha
          cache-to: type=gha,mode=max

          # Optional but recommended for provenance
          provenance: false
