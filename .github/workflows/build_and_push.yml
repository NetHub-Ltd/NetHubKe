name: Build, Push & Deploy Nethub Backend

on:
  push:
    tags:
      - "v*"

jobs:
  # --- JOB 1: Build the Image (Inlined) ---
  build-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          # context is the folder containing your code
          context: ./apps/backend
          # file is relative to the repo root
          file: ./apps/backend/Dockerfile
          push: true
          # Tags the image with your Git Tag (e.g., v0.0.3)
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nethubke:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- JOB 2: Sync Prod Config to VPS ---
  sync-configs:
    needs: build-api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy Production Compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "./apps/backend/docker-compose.prod.yml"
          target: "/home/davie/docker_stack/nethubke"
          # strip_components: 2 removes 'apps/' and 'backend/' from the path
          strip_components: 2

      - name: Rename file to docker-compose.yml
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/davie/docker_stack/nethubke
            # Force move to overwrite existing compose files
            mv -f docker-compose.prod.yml docker-compose.yml

  # --- JOB 3: Deploy to VPS ---
  deploy-api:
    needs: sync-configs
    uses: daviekaranja/workflows/.github/workflows/reusable-deploy.yml@master
    with:
      target_directory: "/home/davie/docker_stack/nethubke"
      image_tag: ${{ github.ref_name }}
    secrets:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}