services:
  postgres:
    image: postgres:16-alpine
    container_name: shared-db
    restart: unless-stopped
    networks:
      - nethub-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: 5432
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      FASTAPI_DB_NAME: ${FASTAPI_DB_NAME}
      FASTAPI_DB_USER: ${FASTAPI_DB_USER}
      FASTAPI_DB_PASSWORD: ${FASTAPI_DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test:
        [
          "CMD",
          "psql",
          "-U",
          "${POSTGRES_USER}",
          "-d",
          "${POSTGRES_DB}",
          "-c",
          "SELECT 1",
        ]
      interval: 7s
      timeout: 10s
      retries: 10
      start_period: 30s

  keycloak:
    # Replace 'build' with your production image
    image: your-docker-registry/nethubke-keycloak:${image_tag}
    container_name: ${KEYCLOAK_CONTAINER}
    command: start --optimized --import-realm
    networks:
      - nethub-network
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_DB_DATABASE: ${KEYCLOAK_DB_NAME}
      KC_HOSTNAME: ${KEYCLOAK_DOMAIN}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: x-forwarded # Important for Traefik
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ./realms:/opt/keycloak/data/import:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`${KEYCLOAK_DOMAIN}`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls.certresolver=myresolver"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/9000 && echo -e 'HEAD /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q 'HTTP.*200' <&3",
        ]
      interval: 60s
      retries: 15
    depends_on:
      postgres:
        condition: service_healthy

  fastapi:
    # Points to the image built by your CI/CD
    image: your-docker-registry/nethubke-api:${image_tag}
    container_name: ${FASTAPI_CONTAINER}
    networks:
      - nethub-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fastapi.rule=Host(`${FASTAPI_DOMAIN}`)"
      - "traefik.http.routers.fastapi.entrypoints=websecure"
      - "traefik.http.routers.fastapi.tls.certresolver=myresolver"
      - "traefik.http.services.fastapi.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

volumes:
  db_data:

networks:
  nethub-network:
    external: true # Assumes Traefik and these apps share a pre-existing network
