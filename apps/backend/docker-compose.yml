services:
  postgres:
    image: postgres:16-alpine
    container_name: shared-db
    restart: unless-stopped
    networks:
      - nethub-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: 5432

      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}

      FASTAPI_DB_NAME: ${FASTAPI_DB_NAME}
      FASTAPI_DB_USER: ${FASTAPI_DB_USER}
      FASTAPI_DB_PASSWORD: ${FASTAPI_DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test:
        [
          "CMD",
          "psql",
          "-U",
          "${POSTGRES_USER}",
          "-d",
          "${POSTGRES_DB}",
          "-c",
          "SELECT 1",
        ]
      interval: 7s
      timeout: 10s
      retries: 10
      start_period: 30s

  keycloak:
    build:
      context: .
      dockerfile: Keycloak.Dockerfile
    container_name: ${KEYCLOAK_CONTAINER}
    command: start --optimized --import-realm
    networks:
      - nethub-network
    environment:
      JAVA_OPTS_APPEND: "-Dkeycloak.migration.replace-placeholders=true"
      REALM_NAME: ${KEYCLOAK_REALM}
      KC_DB: postgres
      #      DATABASE CONFIGURATION
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_DB_DATABASE: ${KEYCLOAK_DB_NAME}
      #      availability
      KC_HOSTNAME_ADMIN: ${KEYCLOAK_HOSTNAME_ADMIN}
      KC_HOSTNAME: ${KEYCLOAK_DOMAIN}

      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      # KC_PROXY_HEADERS: none

      #      smtp configuration for email sending
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}

      BACKEND_CLIENT_SECRET: ${BACKEND_CLIENT_SECRET}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

    ports:
      - "${KEYCLOAK_HTTP_PORT}:8080"
    expose:
      - 9000
    volumes:
      - ./realms:/opt/keycloak/data/import:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/9000 && echo -e 'HEAD /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q 'HTTP.*200' <&3",
        ]
      interval: 60s
      timeout: 30s
      retries: 15
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${FASTAPI_CONTAINER}
    env_file:
      - .env
    networks:
      - nethub-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    ports:
      - "${FASTAPI_HTTP_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

volumes:
  db_data:

networks:
  nethub-network:
    driver: bridge
